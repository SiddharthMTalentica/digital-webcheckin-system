version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: skyhigh_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skyhigh_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: skyhigh_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: skyhigh_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/skyhigh_db?sslmode=disable
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_ADDR=redis:6379
    command: ["./init_db.sh"]
    depends_on:
      - postgres
      - redis

  webcheckin:
    build: ./backend_webcheckin
    container_name: skyhigh_webcheckin
    restart: always
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=skyhigh_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HOLD_DURATION=120
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: skyhigh_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
